name: Calendario RSCE 2026 diario


on:
  schedule:
    - cron: '5 4 * * *'   # 04:05 UTC
  workflow_dispatch: {}

jobs:
  run_and_upload:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Madrid

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager beautifulsoup4 geopy python-dotenv folium pandas

      - name: Ejecutar scraper CSV y GeoJSON
        run: |
          # Por defecto guarda en la carpeta ./resultados_agility
          python "./scrape_rsce_csv_geo.py"
          
      - name: Ejecutar generador de mapa HTML
        run: |
          # Copia el CSV a la raíz temporalmente para que generate_map.py lo encuentre
          cp ./resultados_agility/eventos_agility_2026.csv ./eventos_agility_2026.csv || true
          python "./generate_map.py"

      - name: Localizar archivos
        id: files
        run: |
          set -euo pipefail
          CSV_PATH="$(find . -type f -name 'eventos_agility_2026.csv' | head -n 1)"
          GEO_PATH="$(find . -type f -name 'eventos_agility_2026.geojson' | head -n 1)"
          MAP_PATH="$(find . -type f -name 'mapa_agility_2026.html' | head -n 1)"
          
          echo "csv_path=$CSV_PATH" >> "$GITHUB_OUTPUT"
          echo "geo_path=$GEO_PATH" >> "$GITHUB_OUTPUT"
          echo "map_path=$MAP_PATH" >> "$GITHUB_OUTPUT"

      - name: Subir Archivos por FTPS (Manejo 426 con fallback a PROT C)
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }} # Ejemplo: /www/NewWeb/Privado
        run: |
          set -euo pipefail
          
          # Archivos a subir y sus destinos
          BASE_DATA="ftp://${FTP_SERVER}${FTP_REMOTE_DIR}/Competiciones/EventosProx/RSCE/data"
          BASE_HTML="ftp://${FTP_SERVER}${FTP_REMOTE_DIR}/Competiciones/EventosProx/RSCE"
          
          declare -A FILES_TO_UPLOAD=(
            ["${{ steps.files.outputs.csv_path }}"]="${BASE_DATA}/eventos_agility_2026.csv"
            ["${{ steps.files.outputs.geo_path }}"]="${BASE_DATA}/eventos_agility_2026.geojson"
            ["${{ steps.files.outputs.map_path }}"]="${BASE_HTML}/mapa_agility_2026.html"
          )
          
          for local_file in "${!FILES_TO_UPLOAD[@]}"; do
            remote_url="${FILES_TO_UPLOAD[$local_file]}"
            echo "Subiendo $local_file a $remote_url ..."
            
            echo "Intento A) FTPS explícito, PROT P (datos cifrados)"
            if curl --fail --ssl-reqd --ftp-create-dirs \
                 --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
                 --ftp-method nocwd \
                 --upload-file "$local_file" \
                 "$remote_url"; then
              echo "OK intento A"
            else
              echo "Fallo intento A (posible error 426). Intento B) Control cifrado solo (PROT C), datos en claro"
              curl --fail --ftp-ssl-control --ftp-create-dirs \
                   --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
                   --ftp-method nocwd \
                   --upload-file "$local_file" \
                   "$remote_url"
              echo "OK intento B"
            fi
            echo "-----------------------------------"
          done
          
          echo "Todos los archivos subidos con éxito!"
